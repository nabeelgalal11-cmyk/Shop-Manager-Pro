openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ShopOS Auto Repair Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: vehicles
    description: Vehicle management
  - name: estimates
    description: Estimate management
  - name: invoices
    description: Invoice management
  - name: repair-orders
    description: Repair orders and job cards
  - name: inventory
    description: Parts and inventory
  - name: inspections
    description: Vehicle inspections
  - name: appointments
    description: Scheduling and appointments
  - name: payments
    description: Payment tracking
  - name: employees
    description: Employee management
  - name: time-entries
    description: Time tracking
  - name: expenses
    description: Expense tracking
  - name: dashboard
    description: Dashboard analytics
  - name: reminders
    description: Service reminders
  - name: used-cars
    description: Used-car inventory
  - name: reports
    description: Business reports
  - name: user-preferences
    description: Per-user UI preferences
  - name: activity
    description: Per-entity activity timeline
  - name: suppliers
    description: Parts suppliers / vendors
  - name: exports
    description: CSV / ZIP exports for bookkeeping (QuickBooks Online)

paths:
  # ---- EXPORTS / BOOKKEEPING ----
  /exports/invoices.csv:
    get:
      operationId: exportInvoicesCsv
      tags: [exports]
      summary: Download invoices as CSV (QuickBooks-friendly)
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /exports/payments.csv:
    get:
      operationId: exportPaymentsCsv
      tags: [exports]
      summary: Download successful payments as CSV
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /exports/expenses.csv:
    get:
      operationId: exportExpensesCsv
      tags: [exports]
      summary: Download expenses as CSV
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /exports/cogs-journal.csv:
    get:
      operationId: exportCogsJournalCsv
      tags: [exports]
      summary: Download daily COGS journal entries as CSV
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV file (Date, Account, Debit, Credit, Memo)
          content:
            text/csv:
              schema: { type: string }
  /exports/bookkeeping.zip:
    get:
      operationId: exportBookkeepingZip
      tags: [exports]
      summary: Download all bookkeeping CSVs bundled in a single ZIP
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: ZIP archive containing invoices, payments, expenses, and COGS journal CSVs
          content:
            application/zip:
              schema: { type: string, format: binary }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- CUSTOMERS ----
  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerInput"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/vehicles:
    get:
      operationId: getCustomerVehicles
      tags: [customers]
      summary: Get vehicles for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /customers/{id}/statement:
    get:
      operationId: getCustomerStatement
      tags: [customers]
      summary: Get billing statement for customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer billing statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStatement"

  # ---- VEHICLES ----
  /vehicles:
    get:
      operationId: getVehicles
      tags: [vehicles]
      summary: List vehicles
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleListResponse"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleInput"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleInput"
      responses:
        "200":
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vehicles/{id}/warranties:
    get:
      operationId: getVehicleWarranties
      tags: [vehicles]
      summary: Get active warranties for a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active warranties for the vehicle.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleWarrantyEntry"

  /vehicles/{id}/service-history:
    get:
      operationId: getVehicleServiceHistory
      tags: [vehicles]
      summary: Get vehicle service history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceHistoryEntry"

  # ---- ESTIMATES ----
  /estimates:
    get:
      operationId: getEstimates
      tags: [estimates]
      summary: List estimates
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, approved, declined, denied, converted]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of estimates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateListResponse"
    post:
      operationId: createEstimate
      tags: [estimates]
      summary: Create an estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEstimateInput"
      responses:
        "201":
          description: Estimate created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Estimate"

  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get estimate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Estimate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Estimate"
    put:
      operationId: updateEstimate
      tags: [estimates]
      summary: Update estimate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEstimateInput"
      responses:
        "200":
          description: Estimate updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Estimate"
    delete:
      operationId: deleteEstimate
      tags: [estimates]
      summary: Delete estimate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /estimates/{id}/convert:
    post:
      operationId: convertEstimateToInvoice
      tags: [estimates]
      summary: Convert estimate to invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Invoice created from estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /estimates/{id}/send:
    post:
      operationId: sendEstimate
      tags: [estimates]
      summary: Send estimate to customer for approval (email/SMS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                type: object
                properties:
                  emailed: { type: boolean }
                  smsed: { type: boolean }
                  channel: { type: string }
                  estimateUrl: { type: string }
                  publicToken: { type: string }
                  errors:
                    type: array
                    items: { type: string }

  /estimates/{id}/convert-to-ro:
    post:
      operationId: convertEstimateToRepairOrder
      tags: [estimates]
      summary: Convert approved estimate lines into a Repair Order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Repair order created from approved estimate lines
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ---- INVOICES ----
  /invoices:
    get:
      operationId: getInvoices
      tags: [invoices]
      summary: List invoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, void]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceInput"
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceInput"
      responses:
        "200":
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- REPAIR ORDERS ----
  /repair-orders:
    get:
      operationId: getRepairOrders
      tags: [repair-orders]
      summary: List repair orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, waiting_parts, awaiting_approval, completed, delivered, cancelled]
        - name: assignedTo
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of repair orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairOrderListResponse"
    post:
      operationId: createRepairOrder
      tags: [repair-orders]
      summary: Create a repair order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepairOrderInput"
      responses:
        "201":
          description: Repair order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairOrder"

  /repair-orders/{id}:
    get:
      operationId: getRepairOrder
      tags: [repair-orders]
      summary: Get repair order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repair order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairOrder"
    put:
      operationId: updateRepairOrder
      tags: [repair-orders]
      summary: Update repair order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepairOrderInput"
      responses:
        "200":
          description: Repair order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairOrder"
    delete:
      operationId: deleteRepairOrder
      tags: [repair-orders]
      summary: Delete repair order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ---- USED CARS ----
  /used-cars/{id}/recon:
    get:
      operationId: getUsedCarRecon
      tags: [used-cars]
      summary: Get reconditioning cost breakdown for a used car
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reconditioning breakdown for the car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsedCarReconResponse"

  # ---- REPORTS ----
  /reports/repair-order-profitability:
    get:
      operationId: getRepairOrderProfitabilityReport
      tags: [reports]
      summary: Per-repair-order profitability report (top/bottom 10 by margin)
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Repair order profitability report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairOrderProfitabilityReport"

  /reports/used-car-profitability:
    get:
      operationId: getUsedCarProfitabilityReport
      tags: [reports]
      summary: Per-car used-car profitability report (sold cars)
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Used-car profitability report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsedCarProfitabilityReport"

  # ---- INVENTORY ----
  /inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: List inventory items
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryListResponse"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemInput"
      responses:
        "201":
          description: Inventory item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get inventory item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemInput"
      responses:
        "200":
          description: Inventory item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inventory/{id}/movements:
    get:
      operationId: getInventoryMovements
      tags: [inventory]
      summary: List recent stock movements for an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovementListResponse"

  # ---- INSPECTIONS ----
  /inspections:
    get:
      operationId: getInspections
      tags: [inspections]
      summary: List inspections
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: repairOrderId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of inspections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionListResponse"
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create an inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionInput"
      responses:
        "201":
          description: Inspection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  /inspections/{id}:
    get:
      operationId: getInspection
      tags: [inspections]
      summary: Get inspection by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inspection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"
    put:
      operationId: updateInspection
      tags: [inspections]
      summary: Update inspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionInput"
      responses:
        "200":
          description: Inspection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspection"

  # ---- APPOINTMENTS ----
  /appointments:
    get:
      operationId: getAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: status
