components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        notes:
          type: string
        categoryId:
          type: integer
          nullable: true
        preferredChannel:
          type: string
          enum: [email, sms, both]
        smsOptOut:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        vehicleCount:
          type: integer
        totalBilled:
          type: number
        totalPaid:
          type: number
      required:
        - id
        - firstName
        - lastName
        - createdAt
        - updatedAt

    CreateCustomerInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        notes:
          type: string
        categoryId:
          type: integer
          nullable: true
        preferredChannel:
          type: string
          enum: [email, sms, both]
        smsOptOut:
          type: string
      required:
        - firstName
        - lastName

    UpdateCustomerInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        notes:
          type: string
        categoryId:
          type: integer
          nullable: true
        preferredChannel:
          type: string
          enum: [email, sms, both]
        smsOptOut:
          type: string

    CustomerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    CustomerStatement:
      type: object
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        totalBilled:
          type: number
        totalPaid:
          type: number
        balance:
          type: number
      required:
        - customer
        - invoices
        - totalBilled
        - totalPaid
        - balance

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        vin:
          type: string
        licensePlate:
          type: string
        fleetNumber:
          type: string
          nullable: true
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        color:
          type: string
        mileage:
          type: integer
        engineType:
          type: string
        transmissionType:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        customer:
          $ref: "#/components/schemas/Customer"
      required:
        - id
        - customerId
        - year
        - make
        - model
        - createdAt
        - updatedAt

    CreateVehicleInput:
      type: object
      properties:
        customerId:
          type: integer
        vin:
          type: string
        licensePlate:
          type: string
        fleetNumber:
          type: string
          nullable: true
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        color:
          type: string
        mileage:
          type: integer
        engineType:
          type: string
        transmissionType:
          type: string
        notes:
          type: string
      required:
        - customerId
        - year
        - make
        - model

    VehicleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    ServiceHistoryEntry:
      type: object
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        date:
          type: string
          format: date
        mileage:
          type: integer
        serviceType:
          type: string
        description:
          type: string
        cost:
          type: number
        repairOrderId:
          type: integer
      required:
        - id
        - vehicleId
        - date
        - serviceType

    VehicleWarrantyEntry:
      type: object
      properties:
        source:
          type: string
          enum: [repair_order, invoice]
        sourceId:
          type: integer
        sourceNumber:
          type: string
          nullable: true
        itemType:
          type: string
          enum: [part, labor]
        description:
          type: string
        partNumber:
          type: string
          nullable: true
        warrantyMonths:
          type: integer
          nullable: true
        warrantyMiles:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
        startMileage:
          type: integer
          nullable: true
        expiresOn:
          type: string
          format: date-time
          nullable: true
        expiresAtMileage:
          type: integer
          nullable: true
        active:
          type: boolean
      required:
        - source
        - sourceId
        - itemType
        - description
        - startDate
        - active

    LineItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [labor, part, fee, discount]
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number
