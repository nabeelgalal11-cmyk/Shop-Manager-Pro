kind = "web"
previewPath = "/"
title = "ShopOS - Auto Repair Management"
version = "1.0.0"
id = "artifacts/shop-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25445

[services.development]
run = "pnpm --filter @workspace/shop-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shop-os", "run", "build" ]
publicDir = "artifacts/shop-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25445"
BASE_PATH = "/"
